<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#0a1628"/>

  <!-- Grid -->
  <line x1="60" y1="20" x2="60" y2="160" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="130" y1="20" x2="130" y2="160" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="200" y1="20" x2="200" y2="160" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="270" y1="20" x2="270" y2="160" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="340" y1="20" x2="340" y2="160" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="50" y1="60" x2="360" y2="60" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="50" y1="100" x2="360" y2="100" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="50" y1="140" x2="360" y2="140" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

  <!-- Zero line (luck = 0) -->
  <line x1="50" y1="100" x2="360" y2="100" stroke="rgba(200,169,110,0.4)" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Unlucky dots (green, below zero line) -->
  <circle cx="95" cy="135" r="5" fill="#16a34a" opacity="0.9"/>
  <circle cx="120" cy="128" r="6" fill="#16a34a" opacity="0.9"/>
  <circle cx="148" cy="132" r="4" fill="#16a34a" opacity="0.85"/>
  <circle cx="170" cy="125" r="5" fill="#16a34a" opacity="0.85"/>
  <circle cx="200" cy="130" r="4" fill="#16a34a" opacity="0.85"/>
  <circle cx="228" cy="122" r="5" fill="#16a34a" opacity="0.9"/>
  <circle cx="255" cy="126" r="4" fill="#16a34a" opacity="0.85"/>
  <circle cx="282" cy="118" r="5" fill="#16a34a" opacity="0.85"/>
  <circle cx="310" cy="124" r="4" fill="#16a34a" opacity="0.8"/>

  <!-- Lucky dots (red, above zero line) -->
  <circle cx="80" cy="72" r="5" fill="#dc2626" opacity="0.9"/>
  <circle cx="110" cy="65" r="4" fill="#dc2626" opacity="0.85"/>
  <circle cx="140" cy="70" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="175" cy="58" r="6" fill="#dc2626" opacity="0.9"/>
  <circle cx="210" cy="68" r="4" fill="#dc2626" opacity="0.8"/>
  <circle cx="240" cy="62" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="270" cy="55" r="4" fill="#dc2626" opacity="0.85"/>

  <!-- Neutral dots (grey) -->
  <circle cx="90" cy="100" r="3" fill="#94a3b8" opacity="0.6"/>
  <circle cx="155" cy="97" r="3" fill="#94a3b8" opacity="0.6"/>
  <circle cx="220" cy="102" r="3" fill="#94a3b8" opacity="0.6"/>
  <circle cx="290" cy="98" r="3" fill="#94a3b8" opacity="0.6"/>
  <circle cx="330" cy="101" r="3" fill="#94a3b8" opacity="0.6"/>

  <!-- Axes -->
  <line x1="55" y1="20" x2="55" y2="162" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="54" y1="161" x2="360" y2="161" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="205" y="178" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Exit Velocity (mph)</text>
  <text x="22" y="100" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" transform="rotate(-90,22,100)">wOBA Luck</text>

  <!-- Legend -->
  <circle cx="68" cy="175" r="4" fill="#16a34a" opacity="0.9"/>
  <text x="76" y="179" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Unlucky</text>
  <circle cx="132" cy="175" r="4" fill="#dc2626" opacity="0.9"/>
  <text x="140" y="179" font-family="IBM Plex Sans, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Lucky (regression)</text>

  <!-- Badges -->
  <rect x="265" y="22" width="95" height="28" rx="2" fill="rgba(22,163,74,0.2)" stroke="rgba(22,163,74,0.4)" stroke-width="0.5"/>
  <text x="312" y="33" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="rgba(255,255,255,0.5)">MOST UNLUCKY</text>
  <text x="312" y="45" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#86efac" font-weight="500">J. Soto −.039</text>

  <rect x="265" y="57" width="95" height="28" rx="2" fill="rgba(200,169,110,0.12)" stroke="rgba(200,169,110,0.3)" stroke-width="0.5"/>
  <text x="312" y="68" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="rgba(255,255,255,0.5)">KEY METRIC</text>
  <text x="312" y="80" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C8A96E" font-weight="500">xwOBA gap</text>

  <!-- Title -->
  <text x="200" y="207" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="rgba(200,169,110,0.7)" letter-spacing="1">STATCAST · EXIT VELOCITY · LUCK ANALYSIS · 2025</text>
</svg>
